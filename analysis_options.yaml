include: package:lints/recommended.yaml

analyzer:
  exclude:
    # Vendored upstream code — keep it byte-identical to its source.
    - lib/src/_internal/**
  errors:
    # Algorithm port — many fields are set during construction and read later,
    # the analyzer's "could be final" advice is noise here.
    prefer_final_fields: ignore
    constant_identifier_names: ignore

linter:
  rules:
    avoid_print: false
