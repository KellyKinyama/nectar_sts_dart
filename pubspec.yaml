name: nectar_sts_dart
description: >-
  Pure-Dart port of the IEC 62055-41 (STS) prepaid-electricity token core:
  DKGA-02 / DKGA-04 key derivation, EA07 / EA09 (DES) / EA11 (MISTY1)
  encryption, Class 0/1/2 generators and decoders, plus a virtual HSM
  and meter simulator.
version: 0.1.0
repository: https://github.com/KellyKinyama/nectar_sts_dart
homepage: https://github.com/KellyKinyama/nectar_sts_dart
issue_tracker: https://github.com/KellyKinyama/nectar_sts_dart/issues
topics:
  - sts
  - iec62055-41
  - prepaid-electricity
  - cryptography
  - meter

environment:
  sdk: ^3.4.0

dependencies:
  # HTTP server stack for the optional `bin/server.dart` MVP that
  # exposes a NectarAPI-compatible REST surface.
  shelf: ^1.4.0
  shelf_router: ^1.1.0
  # Optional MySQL-backed meter registry + vending audit log, sharing
  # the schema written by the Laravel `sts-vending` dashboard.
  # See `lib/src/server/database.dart` + `db_queries.dart` — pattern
  # mirrors `dart-ari/lib/ari/api/db_queries.dart`.
  eloquent: ^3.2.1
  uuid: ^4.5.1

dev_dependencies:
  test: ^1.25.0
  lints: ^4.0.0
  http: ^1.2.0
